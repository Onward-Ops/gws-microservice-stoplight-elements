name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC token for npm trusted publishing (no NPM_TOKEN needed)

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    name: Test and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version: 24.5
          cache: yarn

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Build packages
        run: yarn build

      - name: Test packages
        run: yarn test

      # Publishes via npm trusted publishing (OIDC): npm exchanges this workflow's
      # id-token for a short-lived credential, so no NPM_TOKEN secret is needed.
      # Requires the trusted publisher configured on the package on npmjs, and
      # npm >= 11.5.1 (bundled with the Node 24 runtime above).
      - name: Publish to npm
        run: npm publish --access public --provenance
